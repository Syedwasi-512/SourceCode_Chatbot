<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <title>SourceCode Assistant</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800&display=swap");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #358585;
        --primary-dark: #2a6b6b;
        --bg-light: #f8fafc;
        --text-main: #1e293b;
      }

      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: transparent;
        height: 100dvh; /* Dynamic height for mobile keyboard fix */
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .chat-container {
        width: 100%;
        max-width: 420px;
        height: 100dvh;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        position: relative;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }

      /* Desktop View */
      @media (min-width: 600px) {
        .chat-container {
          height: 600px;
          border-radius: 16px;
          margin: 20px;
          border: 1px solid #e2e8f0;
        }
      }

      .chat-header {
        padding: 14px 18px;
        background: var(--primary);
        color: white;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        z-index: 10;
      }

      .logo {
        font-size: 20px;
      }
      .brand-name {
        font-family: "Montserrat", sans-serif;
        font-size: 18px;
        color: #ffffff;
        letter-spacing: 1px;
        font-weight: 800; /* Heavy weight for "SOURCE" */
        text-transform: uppercase;
        display: flex;
        align-items: center;
      }

      .brand-name span {
        font-weight: 400; /* Light/Regular weight for "CODE" */
        margin-left: 5px; /* Thora sa gap */
      }

      .header-info h2 {
        font-size: 15px;
        font-weight: 500;
      }
      .header-info p {
        font-family: "Montserrat", sans-serif;
        font-size: 12px;
        font-weight: 400;
        opacity: 0.85;
        margin-top: -2px;
        letter-spacing: 8px;
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        background: var(--bg-light);
        display: flex;
        flex-direction: column;
        gap: 12px;
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
      }

      .chat-messages a {
        color: #007bff;
        text-decoration: underline;
        word-wrap: break-word;
      }
      .message {
        max-width: 85%;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.5;
        word-wrap: break-word;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        align-self: flex-end;
        background: var(--primary);
        color: white;
        border-bottom-right-radius: 2px;
      }

      .message.bot {
        align-self: flex-start;
        background: white;
        color: var(--text-main);
        border: 1px solid #e2e8f0;
        border-bottom-left-radius: 2px;
      }

      .chat-input {
        padding: 12px 16px;
        background: white;
        border-top: 1px solid #e2e8f0;
        display: flex;
        gap: 10px;
        flex-shrink: 0;
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
      }

      .chat-input input {
        flex: 1;
        padding: 10px 16px;
        border: 1px solid #e2e8f0;
        border-radius: 25px;
        outline: none;
        font-size: 16px; /* Prevents iOS Zoom */
        background: #f1f5f9;
      }

      .chat-input input:focus {
        border-color: var(--primary);
        background: white;
      }

      .chat-input button {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: var(--primary);
        color: white;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
      }

      .chat-input button:hover {
        background: var(--primary-dark);
        transform: scale(1.05);
      }

      /* Category Badges */
      .badge {
        display: inline-block;
        font-size: 10px;
        font-weight: bold;
        padding: 2px 8px;
        border-radius: 4px;
        margin-bottom: 5px;
        text-transform: uppercase;
      }
      .badge-welcome {
        background: #dbeafe;
        color: #1e40af;
      }
      .badge-student {
        background: #dcfce7;
        color: #15803d;
      }
      .badge-parent {
        background: #fef3c7;
        color: #92400e;
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">
        <div class="logo">📚</div>
        <div class="header-info">
          <h2 class="brand-name">SOURCE<span>CODE</span></h2>
          <p>ACADEMIA</p>
        </div>
      </div>

      <div class="chat-messages" id="messages">
        <div class="message bot">
          <span class="badge badge-welcome">Welcome</span><br />
          Hello! I'm SourceCode Assistant. How can I help you with our courses
          or services today?
        </div>
      </div>

      <div class="chat-input">
        <input
          type="text"
          id="userInput"
          placeholder="Type your message..."
          autocomplete="off"
        />
        <button id="sendBtn">➤</button>
      </div>
    </div>

    <script>
      const messagesDiv = document.getElementById("messages");
      const inputField = document.getElementById("userInput");
      const sendBtn = document.getElementById("sendBtn");

      // index.html mein marked configuration ko is se update karein
      const renderer = new marked.Renderer();

      // Naye version ke mutabik link logic
      renderer.link = ({ href, title, text }) => {
        return `<a href="${href}" target="_blank" rel="noopener noreferrer">${text}</a>`;
      };

      marked.setOptions({ renderer: renderer });

      function addMessage(text, role, type = null) {
        const msg = document.createElement("div");
        msg.className = `message ${role}`;
        let badge = type
          ? `<span class="badge badge-${type}">${type}</span><br>`
          : "";

        // Bot ke response ko Markdown parse karna lazmi hai
        if (role === "bot" && text !== "...") {
          msg.innerHTML = badge + marked.parse(text);
        } else {
          msg.innerHTML = badge + text.replace(/\n/g, "<br>");
        }

        messagesDiv.appendChild(msg);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        return msg;
      }

      async function handleSend() {
        const text = inputField.value.trim();
        if (!text) return;

        inputField.value = "";
        addMessage(text, "user");

        const typing = addMessage("...", "bot");

        const API_URL =
          window.location.hostname === "localhost"
            ? "http://localhost:3000/chat"
            : "/chat";

        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text }),
          });

          const data = await response.json();
          typing.remove(); // Purana indicator hatayien

          if (data.reply) {
            addMessage(data.reply, "bot"); // Data ke andar se reply nikaal kar show karein
          } else {
            addMessage("I am sorry, I couldn't get a response.", "bot");
          }
        } catch (err) {
          typing.remove();
          addMessage(
            "Connection error. Please check your internet or balance.",
            "bot",
          );
          console.error("Error:", err);
        }
      }

      sendBtn.onclick = handleSend;
      inputField.onkeydown = (e) => {
        if (e.key === "Enter") handleSend();
      };
    </script>
  </body>
</html>
